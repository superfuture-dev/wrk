name: Release

on:
  push:
    tags:
      - "v*"

defaults:
  run:
    shell: bash

permissions:
  contents: write

jobs:
  build:
    name: Package (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        include:
          - os: ubuntu-latest
            python: python3
          - os: macos-latest
            python: python3
          - os: windows-latest
            python: python

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Run release checks
        run: |
          cargo fmt --all -- --check
          cargo clippy --all-targets --all-features -- -D warnings
          cargo test --all-targets --all-features

      - name: Package release archive
        run: |
          TARGET_TRIPLE="$(rustc -vV | sed -n 's/^host: //p')"
          cargo build --locked --release --target "$TARGET_TRIPLE"
          ${{ matrix.python }} scripts/package_release.py \
            --target "$TARGET_TRIPLE" \
            --version "${GITHUB_REF_NAME#v}" \
            --name wrk \
            --dist-dir dist

      - name: Upload release artifacts
        uses: actions/upload-artifact@v5
        with:
          name: release-${{ runner.os }}
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v5
        with:
          path: dist
          merge-multiple: true

      - name: Create combined checksum file
        run: sha256sum dist/* > dist/sha256sums.txt

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          if ! gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --generate-notes
          fi
          gh release upload "$GITHUB_REF_NAME" dist/* --clobber
